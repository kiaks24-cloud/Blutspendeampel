<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blutspendemobil</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      text-align: center;
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      max-width: 500px;
      width: 90%;
    }

    .ampel {
      background: #222;
      width: 140px;
      margin: 0 auto 25px auto;
      padding: 20px 0;
      border-radius: 25px;
    }

    .light {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      margin: 15px auto;
      opacity: 0.2;
    }

    .red { background: red; }
    .yellow { background: gold; }
    .green { background: limegreen; }

    .active {
      opacity: 1;
      box-shadow: 0 0 25px currentColor;
    }

    #statusText {
      font-size: 28px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Blutspendemobil</h1>

    <div class="ampel">
      <div id="red" class="light red"></div>
      <div id="yellow" class="light yellow"></div>
      <div id="green" class="light green"></div>
    </div>

    <div id="statusText">Lade...</div>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

    const supabase = createClient(
      'https://ljjpefhiqpyjvgohoorj.supabase.co',
      'sb_publishable_c5aJAVl3RS4B2yFqyctT0A_W7ni7FgC'
    )

    function showLight(status) {
      document.getElementById('red').classList.remove('active')
      document.getElementById('yellow').classList.remove('active')
      document.getElementById('green').classList.remove('active')

      const text = document.getElementById('statusText')

      if (status === 'green') {
        document.getElementById('green').classList.add('active')
        text.innerText = 'Grün – Spende sinnvoll'
      } else if (status === 'yellow') {
        document.getElementById('yellow').classList.add('active')
        text.innerText = 'Gelb – Wartezeit möglich'
      } else if (status === 'red') {
        document.getElementById('red').classList.add('active')
        text.innerText = 'Rot – aktuell nicht sinnvoll'
      } else {
        text.innerText = 'Neutral'
      }
    }

    async function loadStatus() {
      const { data } = await supabase
        .from('traffic_status')
        .select('*')
        .eq('id', 1)
        .single()

      const updated = new Date(data.updated_at).getTime()
      const expired = Date.now() - updated > 20 * 60 * 1000

const status = expired ? 'green' : data.status
      showLight(status)
    }

    loadStatus()
    setInterval(loadStatus, 5000)
  </script>

</body>
</html>
